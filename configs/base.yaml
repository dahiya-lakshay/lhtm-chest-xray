model:
  d_model: 128
  num_heads: 4
  num_layers: 4
  ff_dim: 256
  dropout: 0.1
  window_size: 4
  num_routing_tokens: 8

image:
  img_size: 224
  patch_size: 16
  in_channels: 3
  num_classes: 2
  use_class_token: True
  use_pos_encoding: True

training:
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.0001
  epochs: 50